<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission: Unlock | Geocaching Mystery</title>
    <style>
        :root {
            --bg: #050505;
            --gold: #8a6d3b;
            --danger: #800000;
            --metal: #222;
        }

        body {
            background-color: var(--bg);
            color: #777;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        /* --- Header Intro --- */
        #header-mission {
            width: 100%;
            height: 180px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1511447333015-45b65e60f6d5?q=80&w=2000') center/cover;
            border-bottom: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        #header-mission h1 {
            color: #fff;
            margin: 0;
            letter-spacing: 8px;
            font-size: 1.5em;
            text-shadow: 0 0 10px var(--gold);
        }

        #header-mission p {
            color: var(--gold);
            font-size: 0.7em;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- Status --- */
        #status-area {
            margin-top: 20px;
            text-align: center;
        }

        .pick-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }

        .pick-mini {
            width: 5px;
            height: 25px;
            background: #444;
            border: 1px solid #000;
            transition: all 0.5s ease;
        }

        .broken { 
            background: transparent; 
            border: 1px solid var(--danger); 
            transform: rotate(45deg) translateY(10px);
            opacity: 0.2; 
        }

        /* --- Lock Game --- */
        #lock-area {
            position: relative;
            width: 300px;
            height: 300px;
            margin-top: 30px;
        }

        #outer-ring {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #222, #080808);
            border: 10px solid #151515;
            border-radius: 50%;
            box-shadow: inset 0 0 30px #000, 0 0 50px rgba(0,0,0,0.5);
        }

        #inner-cylinder {
            width: 35%;
            height: 35%;
            background: linear-gradient(135deg, #333, #111);
            border: 2px solid #000;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(0deg);
            z-index: 2;
        }

        #key-way {
            width: 8%;
            height: 45%;
            background: #000;
            position: absolute;
            top: 27.5%;
            left: 46%;
            border-radius: 1px;
        }

        #pick-tool {
            position: absolute;
            width: 2px;
            height: 52%;
            background: linear-gradient(to top, #333, #888);
            bottom: 50%;
            left: calc(50% - 1px);
            transform-origin: bottom center;
            pointer-events: none;
            z-index: 5;
        }

        /* --- Controls & Modals --- */
        #btn-rotate {
            display: none;
            margin-top: 40px;
            padding: 15px 50px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.2s;
        }

        #btn-rotate:active { background: var(--gold); color: #000; }

        @media (pointer: coarse) { #btn-rotate { display: block; } }

        .modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            border: 1px solid var(--gold);
            padding: 40px;
            text-align: center;
            z-index: 100;
            width: 80%;
            box-shadow: 0 0 100px #000;
        }

        .coords { 
            color: var(--gold); 
            font-size: 1.3em; 
            margin: 20px 0; 
            letter-spacing: 2px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
        }

        .shaking { animation: vibrate 0.05s infinite; }
        @keyframes vibrate {
            0% { transform: translate(-50%, -50%) rotate(var(--r)); left: 50.3%; }
            100% { transform: translate(-50%, -50%) rotate(var(--r)); left: 49.7%; }
        }
    </style>
</head>
<body>

    <div id="header-mission">
        <h1>MISSION: UNLOCK</h1>
        <p>Status: Top Secret // Autorisierung erforderlich</p>
    </div>

    <div id="status-area">
        <div style="font-size: 0.6em; letter-spacing: 3px; margin-bottom: 5px;">WERKZEUG-RESERVE</div>
        <div class="pick-container" id="picks-icons">
            <div class="pick-mini"></div><div class="pick-mini"></div><div class="pick-mini"></div><div class="pick-mini"></div><div class="pick-mini"></div>
        </div>
    </div>

    <div id="lock-area">
        <div id="outer-ring">
            <div id="inner-cylinder">
                <div id="key-way"></div>
            </div>
        </div>
        <div id="pick-tool"></div>

        <!-- Sieg -->
        <div id="win" class="modal">
            <h2 style="color:var(--gold); font-size: 1em;">ZUGRIFF GEWÄHRT</h2>
            <div class="coords">N 52° 32.906′<br>E 13° 02.140′</div>
            <button onclick="location.reload()" style="background:none; color:#444; border:none; cursor:pointer; font-size: 0.7em;">[SYSTEM REBOOT]</button>
        </div>

        <!-- Niederlage -->
        <div id="lost" class="modal">
            <h2 style="color:var(--danger); font-size: 1em;">PROTOKOLL GESCHEITERT</h2>
            <p style="font-size: 0.7em;">Werkzeuge zerstört. Verbindung getrennt.</p>
            <button onclick="location.reload()" style="background:none; color:#444; border:none; cursor:pointer; font-size: 0.7em;">[RETRY MISSION]</button>
        </div>
    </div>

    <button id="btn-rotate">ROTATION STARTEN</button>
    <p style="font-size: 0.5em; opacity: 0.4; margin-top: 20px;">(PC: LEERTASTE GEDRÜCKT HALTEN)</p>

    <script>
        const pick = document.getElementById('pick-tool');
        const cylinder = document.getElementById('inner-cylinder');
        const area = document.getElementById('lock-area');
        const btn = document.getElementById('btn-rotate');
        const pickIcons = document.getElementById('picks-icons').children;

        let lives = 5;
        let health = 100;
        let isDone = false;
        let pressing = false;
        let rot = 0;
        let pAngle = 0;

        // ALBTRAUM: Extrem enger Sweetspot
        const target = Math.floor(Math.random() * 150) - 75;

        let ctx;
        const snd = (f, d, v) => { if(!ctx) return; let o=ctx.createOscillator(), g=ctx.createGain(); o.type='square'; o.frequency.value=f; g.gain.value=v; o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+d); };

        function update(x, y) {
            if (isDone || pressing) return;
            if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            const b = area.getBoundingClientRect();
            const a = Math.atan2(y - (b.top + b.height/2), x - (b.left + b.width/2)) * (180/Math.PI) + 90;
            pAngle = Math.max(-90, Math.min(90, a));
            
            // Leichter Albtraum-Tremor (Zittern des Dietrichs)
            let tremor = (Math.random() - 0.5) * 0.9;
            pick.style.transform = `rotate(${pAngle + tremor}deg)`;
        }

        window.addEventListener('mousemove', (e) => update(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => { e.preventDefault(); update(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});

        const start = () => { if(!isDone && lives > 0) { pressing = true; if(ctx && ctx.state === 'suspended') ctx.resume(); } };
        const end = () => { pressing = false; if(!isDone) { rot = 0; cylinder.style.transform = `translate(-50%, -50%) rotate(0deg)`; cylinder.classList.remove('shaking'); } };

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') start(); });
        window.addEventListener('keyup', (e) => { if(e.code === 'Space') end(); });
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
        btn.addEventListener('touchend', end);

        function tick() {
            if (isDone || lives <= 0) return;

            if (pressing) {
                const diff = Math.abs(pAngle - target);
                // Nur 1.2 Grad Toleranz für den Erfolg
                let limit = (diff <= 1.2) ? 90 : Math.max(1, 90 - (diff * 8));

                if (rot < limit) {
                    rot += 1.3;
                    let display = Math.min(rot, 90);
                    cylinder.style.setProperty('--r', display + 'deg');
                    cylinder.style.transform = `translate(-50%, -50%) rotate(${display}deg)`;
                    if (rot >= 90) {
                        isDone = true;
                        snd(400, 0.1, 0.05);
                        setTimeout(() => snd(600, 0.2, 0.05), 100);
                        document.getElementById('win').style.display = 'block';
                    }
                } else {
                    // Blockade
                    cylinder.classList.add('shaking');
                    snd(80 + Math.random()*40, 0.05, 0.02);
                    health -= 3.0; // Schnellerer Bruch im Albtraum-Modus
                    if (health <= 0) {
                        lives--;
                        end();
                        health = 100;
                        if(pickIcons[lives]) pickIcons[lives].classList.add('broken');
                        if(lives <= 0) document.getElementById('lost').style.display = 'block';
                    }
                }
            }
            requestAnimationFrame(tick);
        }
        tick();
    </script>
</body>
</html>
