<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lockpicking - Hardcore Mode</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --gold-color: #b8930d;
            --text-color: #d1d1d1;
            --danger-color: #cc0000;
            --ui-bg: rgba(0, 0, 0, 0.95);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #status-bar {
            position: absolute;
            top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1em;
            color: var(--gold-color);
            z-index: 20;
            background: rgba(20,20,20,0.8);
            padding: 10px 20px;
            border: 1px solid #333;
            border-radius: 5px;
        }

        #picks-container { display: flex; gap: 8px; }

        .pick-icon {
            width: 6px;
            height: 22px;
            background: #666;
            border: 1px solid #000;
            transition: all 0.2s;
        }

        .pick-icon.broken {
            background: #222;
            transform: rotate(70deg) scale(0.5);
            box-shadow: none;
        }

        #game-container {
            position: relative;
            width: 85vw;
            max-width: 380px;
            height: 85vw;
            max-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #lock-casing {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #444, #000);
            border: 10px solid #1a1a1a;
            border-radius: 50%;
            position: relative;
        }

        #lock-cylinder {
            width: 42%;
            height: 42%;
            background: radial-gradient(circle, #777, #222);
            border: 4px solid #111;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(0deg);
        }

        #keyhole {
            width: 10%;
            height: 40%;
            background-color: #000;
            position: absolute;
            top: 30%;
            left: 45%;
            border-radius: 2px;
        }

        #pick {
            position: absolute;
            width: 3px;
            height: 58%;
            background: #999;
            bottom: 50%;
            left: calc(50% - 1.5px);
            transform-origin: bottom center;
            pointer-events: none;
            z-index: 10;
        }

        #mobile-rotate-btn {
            display: none;
            margin-top: 30px;
            padding: 20px 60px;
            font-size: 1.2em;
            letter-spacing: 2px;
            background-color: #1a1a1a;
            color: var(--gold-color);
            border: 2px solid var(--gold-color);
            border-radius: 5px;
            cursor: pointer;
        }

        @media (pointer: coarse) { #mobile-rotate-btn { display: block; } }

        .overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--ui-bg);
            padding: 40px;
            border: 1px solid var(--gold-color);
            text-align: center;
            z-index: 100;
            width: 80%;
        }

        .coords {
            font-size: 1.4em;
            color: var(--gold-color);
            margin: 20px 0;
            border: 1px solid #333;
            padding: 10px;
        }

        .shake { animation: shake 0.08s infinite; }
        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(var(--rot)); margin-left: 1px; }
            50% { transform: translate(-50%, -50%) rotate(var(--rot)); margin-left: -1px; }
        }
    </style>
</head>
<body>

    <div id="status-bar">
        <span>STABILITÄT: <span id="durability-ui">100</span>%</span>
        <div id="picks-container">
            <div class="pick-icon"></div>
            <div class="pick-icon"></div>
            <div class="pick-icon"></div>
            <div class="pick-icon"></div>
            <div class="pick-icon"></div>
        </div>
    </div>

    <div id="game-container">
        <div id="lock-casing">
            <div id="lock-cylinder">
                <div id="keyhole"></div>
            </div>
        </div>
        <div id="pick"></div>

        <div id="success-screen" class="overlay">
            <h2 style="color:var(--gold-color)">GEÖFFNET</h2>
            <div class="coords">N 52° 32.906′<br>E 13° 02.140′</div>
            <button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; padding:10px;">NEUSTART</button>
        </div>

        <div id="fail-screen" class="overlay">
            <h2 style="color:var(--danger-color)">DIETRICHE GEBROCHEN</h2>
            <button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; padding:10px;">ERNEUT VERSUCHEN</button>
        </div>
    </div>

    <button id="mobile-rotate-btn">DREHEN</button>

    <script>
        const pick = document.getElementById('pick');
        const cylinder = document.getElementById('lock-cylinder');
        const casing = document.getElementById('lock-casing');
        const rotateBtn = document.getElementById('mobile-rotate-btn');
        const durUI = document.getElementById('durability-ui');
        const pickIcons = document.querySelectorAll('.pick-icon');

        let attempts = 5;
        let pickDurability = 100; 
        let solved = false;
        let isTrying = false;
        let cylinderRotation = 0;
        let pickAngle = 0;
        
        // HARD MODE: Zufälliger Sweetspot
        const sweetSpot = Math.floor(Math.random() * 160) - 80; 

        let audioCtx;
        const initAudio = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); };
        const playSnd = (f, d, t, v) => { if(!audioCtx) return; let o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=t; o.frequency.value=f; g.gain.value=v; o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); };

        function updatePick(x, y) {
            if (solved || isTrying) return;
            initAudio();
            const b = casing.getBoundingClientRect();
            const a = Math.atan2(y - (b.top + b.height/2), x - (b.left + b.width/2)) * (180/Math.PI) + 90;
            pickAngle = Math.max(-90, Math.min(90, a));
            pick.style.transform = `rotate(${pickAngle}deg)`;
        }

        document.addEventListener('mousemove', (e) => updatePick(e.clientX, e.clientY));
        casing.addEventListener('touchmove', (e) => { e.preventDefault(); updatePick(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        
        const start = () => { if(!solved && attempts > 0) { initAudio(); isTrying = true; } };
        const stop = () => { isTrying = false; if(!solved) { cylinderRotation = 0; cylinder.style.transform = `translate(-50%, -50%) rotate(0deg)`; cylinder.classList.remove('shake'); } };

        document.addEventListener('keydown', (e) => { if(e.code === 'Space') start(); });
        document.addEventListener('keyup', (e) => { if(e.code === 'Space') stop(); });
        rotateBtn.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
        rotateBtn.addEventListener('touchend', stop);

        function loop() {
            if (solved || attempts <= 0) return;

            if (isTrying) {
                const diff = Math.abs(pickAngle - sweetSpot);
                let maxRot;

                // HARD MODE: Nur 2 Grad Toleranz für den Sieg
                if (diff <= 2) {
                    maxRot = 90;
                } else {
                    // HARD MODE: Steilere Blockade-Kurve
                    maxRot = Math.max(2, 90 - (diff * 6)); 
                }

                if (cylinderRotation < maxRot) {
                    cylinderRotation += 1.8;
                    let r = Math.min(cylinderRotation, 90);
                    cylinder.style.setProperty('--rot', r + 'deg');
                    cylinder.style.transform = `translate(-50%, -50%) rotate(${r}deg)`;
                    if (cylinderRotation >= 90) win();
                } else {
                    cylinder.classList.add('shake');
                    playSnd(200, 0.05, 'square', 0.03);
                    // HARD MODE: Schnellerer Verschleiß
                    pickDurability -= 2.0; 
                    durUI.innerText = Math.max(0, Math.floor(pickDurability));
                    if (pickDurability <= 0) breakPick();
                }
            }
            requestAnimationFrame(loop);
        }

        function breakPick() {
            stop();
            playSnd(100, 0.2, 'square', 0.1);
            attempts--;
            if(pickIcons[attempts]) pickIcons[attempts].classList.add('broken');
            pickDurability = 100;
            durUI.innerText = "100";
            if (attempts <= 0) document.getElementById('fail-screen').style.display = 'block';
        }

        function win() {
            solved = true;
            playSnd(500, 0.2, 'sine', 0.1);
            document.getElementById('success-screen').style.display = 'block';
            rotateBtn.style.display = 'none';
        }

        loop();
    </script>
</body>
</html>
